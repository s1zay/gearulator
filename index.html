<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raid Gear Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-wrapper">
        
        <div class="left-col">
            
            <div class="top-controls-wrapper">
                
                <div class="champ-setup-block">
                    <div class="top-utility-wrap champ-select-wrap" style="margin-bottom: 0;">
                        <label class="top-utility-label" style="text-align: center; font-size:0.75em;">Champion</label>
                        <select id="champSelect" class="top-utility champ-select" onchange="champChanged()">
                            <option value="deathknight" selected>Deathknight</option>
                            <option value="ninja">Ninja</option>
                            <option value="marius">Marius the Gallant</option>
			    <option value="mavara">Mavara the Web Diviner</option>
                        </select>
                    </div>
                    
                    <div class="awk-util-row">
                        <div class="top-utility-wrap" style="flex: 1;">
                            <label class="top-utility-label">Awakening</label>
                            <select id="awkSelect" class="top-utility" onchange="updateSummary()">
                                <option value="0">0★ (None)</option>
                                <option value="1">1★</option>
                                <option value="2">2★</option>
                                <option value="3">3★</option>
                                <option value="4">4★</option>
                                <option value="5">5★</option>
                                <option value="6">6★</option>
                            </select>
                        </div>
                        <div class="top-utility-wrap" style="flex: 1;">
                            <label class="top-utility-label">Utility</label>
                            <select id="utilitySelect" class="top-utility" onchange="updateGlobal()">
                                <option value="ATK Nuker">ATK Nuker</option>
                                <option value="DEF Nuker">DEF Nuker</option>
                                <option value="HP Nuker">HP Nuker</option>
                                <option value="Tank">Tank</option>
                                <option value="Support">Support</option>
                                <option value="Custom">Custom</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="section-card" id="rngCard" style="margin-bottom: 0;">
                    <div class="section-header" onclick="toggleSection('rngCard')">
                        <h2>Simulator</h2>
                        <span class="toggle-arrow">▼</span>
                    </div>
                    <div class="section-content">
                        <div style="display: flex; gap: 10px; width: 100%;">
                            <button class="rng-btn" style="flex: 1;" onclick="rollDice()">🎲 Roll</button>
                            <button class="rng-btn reset-btn" style="flex: 1;" onclick="resetSubstats()">🔄 Reset</button>
                        </div>
                        <div class="setting-row" style="margin-top: 15px; margin-bottom: 0;">
                            <div class="setting-label"><span>Kraken Scale (0-100%)</span><span id="rarityLabel" style="color:var(--gold)">50%</span></div>
                            <input type="range" id="budgetSlider" min="0" max="100" value="50" step="0.1" oninput="updateGlobal()">
                        </div>
                    </div>
                </div>

            </div> 

            <div class="gear-grid" id="mainGrid"></div>
        </div>

        <div class="right-col">
            
            <div class="right-top-wrapper">
                
                <div class="section-card collapsed" id="setupCard">
                    <div class="section-header" onclick="toggleSection('setupCard')">
                        <h2>Global Gear Setup</h2>
                        <span class="toggle-arrow">▼</span>
                    </div>
                    <div class="section-content">
                        <div class="toggle-group">
                            <label class="gh-toggle">
                                <input type="checkbox" id="ghToggle" checked onchange="updateSummary()">
                                Max Great Hall Bonus
                            </label>
                            <label class="gh-toggle">
                                <input type="checkbox" id="fgToggle" checked onchange="updateSummary()">
                                Max Faction Guardians
                            </label>
                        </div>
                        
                        <div class="glyph-row">
                            <label>Max Faction Wars Glyphs:
                                <select id="glyphSelect" onchange="updateGlobal()">
                                    <option value="0">Off (No Glyphs)</option>
                                    <option value="green5">Max 5★ Basic (Green)</option>
                                    <option value="green6">Max 6★ Basic (Green)</option>
                                    <option value="blue6">Max 6★ Rare (Blue)</option>
                                    <option value="purple6">Max 6★ Epic (Purple)</option>
                                    <option value="gold6">Max 6★ Legendary (Gold)</option>
                                </select>
                            </label>
                        </div>
                        
                        <div class="setting-row" style="margin-top: 15px; border-top: 1px solid #444; padding-top: 10px;">
                            <div class="setting-label">Gear Ascension Injection</div>
                            <select id="ascensionMode" class="top-utility" style="margin-top: 5px; font-size: 0.8em; padding: 6px;" onchange="handleAscensionModeChange()">
                                <option value="off" selected>Off</option>
                                <option value="ideal">Ideal (Matches Utility)</option>
                                <option value="custom" style="display:none;">Custom</option>
                            </select>
                        </div>

                        <div class="setting-row" style="margin-top: 15px; border-top: 1px solid #444; padding-top: 10px;">
                            <div class="setting-label">Calculation Display Mode</div>
                            <select id="displayMode" class="top-utility" style="margin-top: 5px; font-size: 0.8em; padding: 6px;" onchange="updateSummary(); gCfg.forEach(p => renderPiece(p.id));">
                                <option value="random" selected>Random (Realistic)</option>
                                <option value="range">Range (Min-Max)</option>
                                <option value="avg">Average</option>
                                <option value="low">Low Rolls</option>
                                <option value="high">High Rolls</option>
                            </select>
                        </div>

                        <div class="setting-row" style="margin-top: 15px; border-top: 1px solid #444; padding-top: 10px;">
                            <div class="setting-label">Expected Enemy Ignore DEF (eHP Calcs)</div>
                            <select id="ignoreDefSelect" class="top-utility" style="margin-top: 5px; font-size: 0.8em; padding: 6px;" onchange="updateGlobal()">
                                <option value="0">0% (Standard PvE)</option>
                                <option value="0.25">25% (Savage/Lethal / Arena)</option>
                                <option value="0.50">50% (Savage + Cruel + Masteries)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="section-card collapsed" id="setsCard">
                    <div class="section-header" onclick="toggleSection('setsCard')">
                        <h2>Active Sets <span id="setBudgetLabel" style="color:#aaa; font-family:monospace; font-size:1.1em; letter-spacing:0;">[0/9]</span></h2>
                        <span class="toggle-arrow">▼</span>
                    </div>
                    <div class="section-content">
                        <div class="set-category">
                            <div class="set-cat-header">Offense / Nuke</div>
                            <div id="setList_off" class="set-list"></div>
                            <select id="setSel_off" class="set-select" onchange="addSet(this.value, 'off')">
                                <option value="">+ Add Set...</option>
                            </select>
                        </div>
                        <div class="set-category">
                            <div class="set-cat-header">Speed / Utility</div>
                            <div id="setList_spd" class="set-list"></div>
                            <select id="setSel_spd" class="set-select" onchange="addSet(this.value, 'spd')">
                                <option value="">+ Add Set...</option>
                            </select>
                        </div>
                        <div class="set-category" style="margin-bottom:0;">
                            <div class="set-cat-header">Survival / Hybrid</div>
                            <div id="setList_surv" class="set-list"></div>
                            <select id="setSel_surv" class="set-select" onchange="addSet(this.value, 'surv')">
                                <option value="">+ Add Set...</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="section-card collapsed" id="masteryCard">
                    <div class="section-header" onclick="toggleSection('masteryCard')">
                        <h2>Mastery Selection</h2>
                        <span class="toggle-arrow">▼</span>
                    </div>
                    <div class="section-content">
                        <div class="mastery-container">
                            <div class="tree-col offense-bg" id="tree_offense">
                                <span class="tree-name">OFFENSE</span>
                                <label class="mastery-item"><input type="checkbox" class="m-check" data-tree="offense" data-tier="1" id="m_blade" onchange="mUpdate()"><div class="m-info"><span class="m-title">Blade Disc.</span><span class="m-stat">+75 ATK</span></div></label>
                                <label class="mastery-item"><input type="checkbox" class="m-check" data-tree="offense" data-tier="1" id="m_deadly" onchange="mUpdate()"><div class="m-info"><span class="m-title">Deadly Prec.</span><span class="m-stat">+5% C. RATE</span></div></label>
                                <label class="mastery-item"><input type="checkbox" class="m-check" data-tree="offense" data-tier="2" id="m_keen" onchange="mUpdate()"><div class="m-info"><span class="m-title">Keen Strike</span><span class="m-stat">+10% C. DMG</span></div></label>
                                <label class="mastery-item"><input type="checkbox" class="m-check" data-tree="offense" data-tier="6" id="m_flawless" onchange="mUpdate()"><div class="m-info"><span class="m-title">Flawless</span><span class="m-stat">+20% C. DMG</span></div></label>
                            </div>
                            <div class="tree-col defense-bg" id="tree_defense">
                                <span class="tree-name">DEFENSE</span>
                                <label class="mastery-item"><input type="checkbox" class="m-check" data-tree="defense" data-tier="1" id="m_tough" onchange="mUpdate()"><div class="m-info"><span class="m-title">Tough Skin</span><span class="m-stat">+75 DEF</span></div></label>
                                <label class="mastery-item"><input type="checkbox" class="m-check" data-tree="defense" data-tier="1" id="m_defiant" onchange="mUpdate()"><div class="m-info"><span class="m-title">Defiant</span><span class="m-stat">+10 RES</span></div></label>
                                <label class="mastery-item"><input type="checkbox" class="m-check" data-tree="defense" data-tier="6" id="m_iron" onchange="mUpdate()"><div class="m-info"><span class="m-title">Iron Skin</span><span class="m-stat">+200 DEF</span></div></label>
                                <label class="mastery-item"><input type="checkbox" class="m-check" data-tree="defense" data-tier="6" id="m_unshakable" onchange="mUpdate()"><div class="m-info"><span class="m-title">Unshakable</span><span class="m-stat">+50 RES</span></div></label>
                            </div>
                            <div class="tree-col support-bg" id="tree_support">
                                <span class="tree-name">SUPPORT</span>
                                <label class="mastery-item"><input type="checkbox" class="m-check" data-tree="support" data-tier="1" id="m_steadfast" onchange="mUpdate()"><div class="m-info"><span class="m-title">Steadfast</span><span class="m-stat">+810 HP</span></div></label>
                                <label class="mastery-item"><input type="checkbox" class="m-check" data-tree="support" data-tier="1" id="m_pinpoint" onchange="mUpdate()"><div class="m-info"><span class="m-title">Pinpoint</span><span class="m-stat">+10 ACC</span></div></label>
                                <label class="mastery-item"><input type="checkbox" class="m-check" data-tree="support" data-tier="6" id="m_elixir" onchange="mUpdate()"><div class="m-info"><span class="m-title">Elixir</span><span class="m-stat">+3000 HP</span></div></label>
                                <label class="mastery-item"><input type="checkbox" class="m-check" data-tree="support" data-tier="6" id="m_eagle" onchange="mUpdate()"><div class="m-info"><span class="m-title">Eagle Eye</span><span class="m-stat">+50 ACC</span></div></label>
                            </div>
                        </div>
                    </div>
                </div>

            </div> 

            <div class="section-card" id="summaryCard">
                <div class="section-header" style="cursor: default;">
                    <h2>Build Summary</h2>
                    <button id="overrideBtn" class="override-btn" onclick="toggleOverride(event)">Override Goals</button>
                </div>
                <div class="section-content summary-wrapper">
                    <div class="summary-grid hide-math" id="summaryOutput" onclick="toggleMath(event)"></div>
                </div>
            </div>

        </div> 

    </div>

    <script src="script.js"></script>
</body>
</html>
