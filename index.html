<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raid Gear Optimizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

    <div class="desktop-layout">
        
        <div class="left-column">
            
            <div class="settings-card">
                <div class="card-header" onclick="toggleSection('championContent')">
                    <span class="card-title">CHAMPION</span>
                </div>
                <div class="card-body" id="championContent">
                    <div class="champ-top-row control-row">
                        <select id="champSelect" onchange="champChanged()" style="text-align: center; font-weight: bold; color: var(--gold);">
                            <option value="deathknight">Deathknight</option>
                            <option value="ninja" selected>Ninja</option>
                            <option value="marius">Marius the Gallant</option>
                        </select>
                    </div>
                    <div class="champ-bottom-row">
                        <div class="control-row">
                            <label class="input-label">AWAKENING</label>
                            <select id="awkSelect" onchange="updateSummary()">
                                <option value="0">0★ (None)</option>
                                <option value="1">1★</option>
                                <option value="2">2★</option>
                                <option value="3">3★</option>
                                <option value="4">4★</option>
                                <option value="5">5★</option>
                                <option value="6" selected>6★</option>
                            </select>
                        </div>
                        <div class="control-row">
                            <label class="input-label">UTILITY</label>
                            <select id="utilitySelect" onchange="updateGlobal()">
                                <option value="ATK Nuker" selected>ATK Nuker</option>
                                <option value="DEF Nuker">DEF Nuker</option>
                                <option value="HP Nuker">HP Nuker</option>
                                <option value="Tank">Tank</option>
                                <option value="Support">Support</option>
                                <option value="Custom">Custom</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="settings-card">
                <div class="card-header" onclick="toggleSection('simulatorContent')">
                    <span class="card-title">SIMULATOR</span>
                </div>
                <div class="card-body" id="simulatorContent">
                    <div class="sim-buttons">
                        <button class="btn-roll" onclick="rollDice()">🎲 ROLL</button>
                        <button class="btn-reset" onclick="resetSubstats()">🔄 RESET</button>
                    </div>
                    <div class="control-row" style="margin-top: 10px;">
                        <label style="display:flex; justify-content:space-between; width:100%; font-size: 0.8em; font-weight: bold;">
                            <span>Perfection Scale (0-100%)</span> 
                            <span id="rarityLabel" style="color:var(--gold);">50%</span>
                        </label>
                        <input type="range" id="budgetSlider" min="0" max="100" value="50" style="width: 100%; margin-top:5px;" oninput="updateGlobal()">
                    </div>
                </div>
            </div>

            <div id="mainGrid" class="desktop-3x3-grid"></div> 

        </div>

        <div class="right-column">
            
            <div class="settings-card">
                <div class="card-header" style="cursor: default;">
                    <span class="card-title">BUILD SUMMARY</span>
                    <button id="overrideBtn" class="btn-small" onclick="toggleOverride()">OVERRIDE GOALS</button>
                </div>
                <div class="card-body">
                    <div style="margin-bottom: 10px; display: flex; justify-content: flex-end; gap: 10px; display:none;">
                        <select id="displayMode" onchange="gCfg.forEach(p=>renderPiece(p.id)); updateSummary();">
                            <option value="avg">Avg Rolls</option>
                            <option value="low">Min Rolls</option>
                            <option value="high">Max Rolls</option>
                            <option value="range">Range</option>
                        </select>
                        <select id="ascensionMode" onchange="handleAscensionModeChange()">
                            <option value="ideal">Ideal Ascensions</option>
                            <option value="off">Off</option>
                            <option value="custom">Custom</option>
                        </select>
                    </div>
                    <div id="summaryOutput" style="display: grid; grid-template-columns: auto auto auto auto; gap: 5px; align-items: center;"></div>
                </div>
            </div>
            
            <div class="settings-card">
                <div class="card-header collapsed" onclick="toggleSection('globalsContent')">
                    <span class="card-title">GLOBAL GEAR SETUP</span>
                </div>
                <div class="card-body collapsed" id="globalsContent" style="display:flex; flex-direction:column; gap:10px;">
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <label class="toggle-btn-label" style="flex:1;"><input type="checkbox" id="ghToggle" onchange="updateSummary()"> Max Great Hall</label>
                        <label class="toggle-btn-label" style="flex:1;"><input type="checkbox" id="fgToggle" onchange="updateSummary()"> Max Faction Guardians</label>
                    </div>
                    <div class="control-row">
                        <label class="input-label">Max Faction Wars Glyphs:</label>
                        <select id="glyphSelect" onchange="updateSummary()">
                            <option value="0">None</option>
                            <option value="green5">Max 5★ Basic (Green)</option>
                            <option value="green6">Max 6★ Basic (Green)</option>
                            <option value="gold6" selected>Max 6★ Mythic (Gold)</option>
                        </select>
                    </div>
                    <div class="control-row">
                        <label class="input-label">Expected Enemy Ignore DEF (eHP Calcs):</label>
                        <select id="ignoreDefSelect" onchange="updateSummary()">
                            <option value="0">0% (Standard PvE)</option>
                            <option value="0.25">25%</option>
                            <option value="0.5">50%</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="settings-card">
                <div class="card-header collapsed" onclick="toggleSection('setsContent')">
                    <span class="card-title">ACTIVE SETS <span id="setBudgetLabel" style="color:#888;">[0/9]</span></span>
                </div>
                <div class="card-body collapsed" id="setsContent">
                    <div style="display: flex; gap: 5px;">
                        <select id="setSel_off" style="flex:1;"></select><button onclick="addSet(document.getElementById('setSel_off').value, 'off')">Add</button>
                    </div>
                    <div id="setList_off"></div>
                    <hr style="border-color:#333;">
                    <div style="display: flex; gap: 5px;">
                        <select id="setSel_spd" style="flex:1;"></select><button onclick="addSet(document.getElementById('setSel_spd').value, 'spd')">Add</button>
                    </div>
                    <div id="setList_spd"></div>
                    <hr style="border-color:#333;">
                    <div style="display: flex; gap: 5px;">
                        <select id="setSel_surv" style="flex:1;"></select><button onclick="addSet(document.getElementById('setSel_surv').value, 'surv')">Add</button>
                    </div>
                    <div id="setList_surv"></div>
                </div>
            </div>

            <div class="settings-card">
                <div class="card-header collapsed" onclick="toggleSection('masteryContent')">
                    <span class="card-title">MASTERY SELECTION</span>
                </div>
                <div class="card-body collapsed" id="masteryContent">
                    <div style="color: #888; font-size: 0.9em; text-align: center; padding: 10px;">
                        Mastery tree UI placeholder. Logic is active in background.
                    </div>
                    <div style="display:none;">
                        <input type="checkbox" class="m-check" id="m_blade" data-tier="1" data-tree="offense">
                        <input type="checkbox" class="m-check" id="m_deadly" data-tier="1" data-tree="offense">
                        <input type="checkbox" class="m-check" id="m_keen" data-tier="2" data-tree="offense">
                        <input type="checkbox" class="m-check" id="m_flawless" data-tier="6" data-tree="offense">
                        <input type="checkbox" class="m-check" id="m_tough" data-tier="1" data-tree="defense">
                        <input type="checkbox" class="m-check" id="m_defiant" data-tier="1" data-tree="defense">
                        <input type="checkbox" class="m-check" id="m_iron" data-tier="6" data-tree="defense">
                        <input type="checkbox" class="m-check" id="m_steadfast" data-tier="1" data-tree="support">
                        <input type="checkbox" class="m-check" id="m_pinpoint" data-tier="1" data-tree="support">
                        <input type="checkbox" class="m-check" id="m_unshakable" data-tier="6" data-tree="defense">
                        <input type="checkbox" class="m-check" id="m_elixir" data-tier="6" data-tree="support">
                        <input type="checkbox" class="m-check" id="m_eagle" data-tier="6" data-tree="support">
                        <div id="tree_offense"></div><div id="tree_defense"></div><div id="tree_support"></div>
                    </div>
                </div>
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
